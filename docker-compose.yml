version: '3.8'

services:
  subtitle-translator:
    build: .
    ports:
      - "3010:3010"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - CRON_SECRET=your-cron-secret-key-here
    volumes:
      # データベースファイルを永続化
      - ./data:/app/data
      # 開発時のホットリロード用（オプション）
      - ./src:/app/src
      - ./public:/app/public
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3010"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# 使用方法:
# 1. docker-compose up -d
# 2. http://localhost:3010 でアクセス
# 3. 環境変数 GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET を設定してOAuth認証を使用
# 4. 環境変数 OPENAI_API_KEY を設定してバッチ機能を使用